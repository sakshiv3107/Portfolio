  <style>
    /* Prevent flash of white during Flutter load */
    body {
      background-color: #0A0F1E;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }
    /* Loading indicator */
    #flutter-loading {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0A0F1E;
      z-index: 9999;
      flex-direction: column;
      gap: 16px;
    }
    #flutter-loading .logo {
      font-family: monospace;
      font-size: 20px;
      color: #00E5FF;
      letter-spacing: 2px;
    }
    #flutter-loading .spinner {
      width: 32px;
      height: 32px;
      border: 2px solid #1E2A3A;
      border-top-color: #00E5FF;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <!-- Loading screen shown before Flutter initializes -->
  <div id="flutter-loading">
    <div class="logo">sakshi.dev</div>
    <div class="spinner"></div>
  </div>

  <script>
    // Hide loading screen once Flutter is ready
    window.addEventListener('flutter-first-frame', function () {
      const loader = document.getElementById('flutter-loading');
      if (loader) {
        loader.style.opacity = '0';
        loader.style.transition = 'opacity 0.4s ease';
        setTimeout(() => loader.remove(), 400);
      }
    });
  </script>

</body>
