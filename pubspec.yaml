name: portfolio
description: Sakshi Vishnoi — Flutter & Mobile Developer Portfolio
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^13.2.0

  # State management
  flutter_riverpod: ^2.5.1

  # UI & Fonts
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1

  # URL launching (GitHub/live links)
  url_launcher: ^6.2.6

  # Icons
  font_awesome_flutter: ^10.7.0

  # Animation helpers
  animate_do: ^3.3.4

  # Scroll visibility detection (for scroll-triggered animations)
  visibility_detector: ^0.4.0+2

  # HTTP for network images
  http: ^1.2.1

  # Session memory (intro seen flag)
  shared_preferences: ^2.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/avatar.png
    - assets/images/
    - assets/icons/
    - assets/resume/
